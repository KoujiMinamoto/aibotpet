<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <title>Gabumon Settings</title>
</head>
<body>
  <div class="settings-page">
    <h2>Gabumon Settings</h2>

    <label for="baseURL">API Base URL</label>
    <input id="baseURL" type="text" placeholder="https://api.openai.com/v1">

    <label for="apiKey">API Key</label>
    <input id="apiKey" type="password" placeholder="sk-...">

    <label for="model">Model</label>
    <input id="model" type="text" placeholder="gpt-4o-mini">

    <label for="petScale">Pet Scale (1-5)</label>
    <input id="petScale" type="number" min="1" max="5" value="3">

    <button id="saveBtn">Save</button>
    <div class="settings-status" id="status"></div>
  </div>

  <script>
    (async () => {
      const api = window.electronAPI;
      const settings = await api.getSettings();

      document.getElementById('baseURL').value = settings.apiBaseURL || '';
      document.getElementById('apiKey').value = settings.apiKey || '';
      document.getElementById('model').value = settings.model || '';
      document.getElementById('petScale').value = settings.petScale || 3;

      document.getElementById('saveBtn').addEventListener('click', async () => {
        const updated = {
          apiBaseURL: document.getElementById('baseURL').value.trim(),
          apiKey: document.getElementById('apiKey').value.trim(),
          model: document.getElementById('model').value.trim(),
          petScale: parseInt(document.getElementById('petScale').value) || 3,
          walkSpeed: settings.walkSpeed || 2,
        };
        await api.saveSettings(updated);
        document.getElementById('status').textContent = 'Saved!';
        setTimeout(() => {
          document.getElementById('status').textContent = '';
        }, 2000);
      });
    })();
  </script>
</body>
</html>
