<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <title>Pet Settings</title>
</head>
<body>
  <div class="settings-page">
    <h2>Pet Settings</h2>

    <label for="pet">Pet</label>
    <select id="pet">
      <option value="gabumon">Gabumon</option>
      <option value="kirby">Kirby</option>
    </select>

    <label for="baseURL">API Base URL (without /chat/completions)</label>
    <input id="baseURL" type="text" placeholder="https://api.openai.com/v1">

    <label for="apiKey">API Key</label>
    <input id="apiKey" type="password" placeholder="sk-...">

    <label for="model">Model</label>
    <input id="model" type="text" placeholder="gpt-4o-mini">

    <label for="webSearchToken">Web Search Token (PPIO, optional)</label>
    <input id="webSearchToken" type="password" placeholder="Leave empty to disable">

    <label for="petScale">Pet Scale (1-5)</label>
    <input id="petScale" type="number" min="1" max="5" value="3">

    <button id="saveBtn">Save</button>
    <div class="settings-status" id="status"></div>
  </div>

  <script>
    (async () => {
      const api = window.electronAPI;
      const settings = await api.getSettings();

      document.getElementById('pet').value = settings.pet || 'gabumon';
      document.getElementById('baseURL').value = settings.apiBaseURL || '';
      document.getElementById('apiKey').value = settings.apiKey || '';
      document.getElementById('model').value = settings.model || '';
      document.getElementById('webSearchToken').value = settings.webSearchToken || '';
      document.getElementById('petScale').value = settings.petScale || 3;

      const saveBtn = document.getElementById('saveBtn');
      const status = document.getElementById('status');

      saveBtn.addEventListener('click', async () => {
        let baseURL = document.getElementById('baseURL').value.trim();
        baseURL = baseURL.replace(/\/chat\/completions\/?$/, '');
        document.getElementById('baseURL').value = baseURL;

        const updated = {
          pet: document.getElementById('pet').value,
          apiBaseURL: baseURL,
          apiKey: document.getElementById('apiKey').value.trim(),
          model: document.getElementById('model').value.trim(),
          webSearchToken: document.getElementById('webSearchToken').value.trim(),
          petScale: parseInt(document.getElementById('petScale').value) || 3,
          walkSpeed: settings.walkSpeed || 2,
        };
        try {
          saveBtn.disabled = true;
          saveBtn.textContent = 'Saving...';
          await api.saveSettings(updated);
          saveBtn.textContent = 'Saved ✓';
          saveBtn.style.background = '#339933';
          status.textContent = 'Settings saved successfully!';
          status.style.color = '#77cc77';
        } catch (e) {
          saveBtn.textContent = 'Save';
          status.textContent = 'Save failed: ' + e.message;
          status.style.color = '#cc7777';
        }
        setTimeout(() => {
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save';
          saveBtn.style.background = '';
          status.textContent = '';
        }, 3000);
      });
    })();
  </script>
</body>
</html>
